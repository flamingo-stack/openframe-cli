# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: openframe-cli

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: openframe-cli
    main: ./main.go
    binary: openframe
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/flamingo-stack/openframe-cli/cmd.DefaultVersionInfo.Version={{.Version}}
      - -X github.com/flamingo-stack/openframe-cli/cmd.DefaultVersionInfo.Commit={{.Commit}}
      - -X github.com/flamingo-stack/openframe-cli/cmd.DefaultVersionInfo.Date={{.Date}}

archives:
  - id: openframe-cli-archive
    ids:
      - openframe-cli
    name_template: "openframe-cli_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - README.md
    wrap_in_directory: false

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Software Bill of Materials, one per archive (generated with syft).
# Additive: publishes *_sbom.spdx.json alongside artifacts; binaries unchanged.
sboms:
  - id: archive
    artifacts: archive

# Keyless cosign signature of the checksums file (which covers every artifact
# via its SHA256). Produces detached checksums.txt.sig + .pem — the binaries
# themselves are NOT modified and run identically with or without verification.
# Requires cosign on PATH and `id-token: write` in the release workflow.
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
      - '--yes'

changelog:
  use: github-native
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^build:'
      - '^style:'
      - '^refactor:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Others
      order: 999

release:
  make_latest: true
  draft: false
  prerelease: auto
  name_template: "🦩 {{ .Tag }}"
