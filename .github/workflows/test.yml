name: Test

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-${{ github.head_ref || github.ref }}
  cancel-in-progress: false


# =============================================================================
# JOBS
# =============================================================================

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: golangci-lint
        # Informational for now: the repo has a known backlog of findings from
        # the security audit. Surface results without failing the pipeline;
        # flip continue-on-error off once the backlog is cleared.
        continue-on-error: true
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest

  test-cli:
    name: Test CLI on ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 70

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: Linux-x64
          - os: windows
            arch: amd64
            runner: Windows-x64
          - os: darwin
            arch: arm64
            runner: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: 'go.mod'
          cache: true
        
      - name: Run integration tests
        if: matrix.os != 'darwin'
        shell: bash
        timeout-minutes: 60
        run: |
          make build
          if [ "${{ matrix.os }}" = "windows" ]; then
            # The Windows binary re-runs the whole CLI inside WSL2, where the
            # cluster and the Kubernetes client live. That needs a *Linux*
            # openframe binary in WSL. `make build` is a dev version with no
            # published release to auto-download, so build the Linux binary and
            # stream it into WSL's ~/.openframe/bin via stdin — no Windows→WSL
            # path translation, which is where the launcher looks for it.
            GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o openframe-linux-amd64 .
            # Install into the WSL *default* distro (the launcher targets the same
            # one) — the runner's distro is not necessarily named "Ubuntu".
            wsl -- bash -c 'mkdir -p "$HOME/.openframe/bin" && cat > "$HOME/.openframe/bin/openframe" && chmod +x "$HOME/.openframe/bin/openframe"' < openframe-linux-amd64
          fi
          ./openframe-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }} bootstrap openframe-test --deployment-mode=oss-tenant --non-interactive --verbose


      - name: Run unit tests
        run: make test-unit

      - name: Run unit tests with race detector
        # Linux only (race detector needs CGO/gcc). Now a blocking gate: the
        # codebase is race-clean (the pterm spinner was replaced with a
        # synchronized wrapper in internal/shared/ui/spinner).
        if: matrix.os == 'linux'
        run: make test-race
